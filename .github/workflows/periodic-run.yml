# https://share.google/aimode/uO1Xau4PrnC3spiKw
name: Run Periodic Code

on:
  schedule:
    # Runs every day at 12:00 AM UTC (Adjust using cron syntax)
    - cron: '0 0 * * 1'
  # Allows you to also trigger this manually from the Actions tab
  workflow_dispatch:

jobs:
  run-reporting-job:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the repository code.
      - name: Check out repository code
        uses: actions/checkout@v4

      # 2. Initialize Python on the worker runner.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.12'

      # 3. Handle third-party dependencies.
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run the script, securely injecting repository secrets.
      - name: Run Python Script
        # This maps the GitHub Secret to an environment variable for this step.
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          SMTP_SERVER: "smtp.gmail.com"
          SMTP_PORT: 587
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python automatically_run_report.py
